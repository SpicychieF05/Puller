<!-- PATH: static/index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puller — grab any YouTube video</title>
  <link rel="icon" type="image/svg+xml" href="/media/puller_fabicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0B0D10;
      --panel: #14171C;
      --panel-2: #1B1F26;
      --line: #262B33;
      --text: #E8EAED;
      --muted: #8A9099;
      --amber: #F5A623;
      --amber-dim: #4A3416;
      --green: #7CFC8A;
      --err: #F26B6B;
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      background:
        radial-gradient(circle at 15% 0%, rgba(245, 166, 35, 0.06), transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 640px;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }

    p.sub {
      color: var(--muted);
      font-size: 14.5px;
      margin: 0 0 32px;
      line-height: 1.5;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
    }

    .url-row,
    .field-row {
      display: flex;
      gap: 10px;
    }

    .field-row {
      margin-top: 15px;
    }

    input[type=text] {
      flex: 1;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14.5px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      transition: border-color .15s;
    }

    input[type=text]:focus {
      border-color: var(--amber);
    }

    input[type=text]::placeholder {
      color: #5B6068;
    }

    button {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform .08s ease, filter .15s ease, background .15s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--amber);
      color: #1A1200;
      padding: 12px 20px;
      white-space: nowrap;
    }

    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    .btn-secondary {
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 12px 20px;
      white-space: nowrap;
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: #3A414C;
      background: #232832;
    }

    .status {
      margin-top: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      color: var(--muted);
      min-height: 16px;
    }

    .status.err {
      color: var(--err);
    }

    .status.ok {
      color: var(--green);
    }

    /* Download status formatting */
    .dl-status-container {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      text-align: right;
      min-height: 18px;
      margin-top: 14px;
    }

    .dl-icon {
      display: none;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .dl-icon.visible {
      display: block;
    }

    .spinner-ring {
      fill: none;
      stroke: var(--amber);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 44 56;
      transform-origin: 50% 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .check-bg {
      fill: none;
      stroke: var(--green);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 22;
      stroke-dashoffset: 22;
      transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .check-bg.drawn {
      stroke-dashoffset: 0;
    }

    .err-line {
      stroke: var(--err);
      stroke-width: 2.5;
      stroke-linecap: round;
    }

    .eta-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      color: var(--muted);
      display: none;
    }

    .eta-label.visible {
      display: inline;
    }

    .dl-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    #resultCard {
      display: none;
      margin-top: 24px;
    }

    .video-card {
      display: flex;
      gap: 14px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 20px;
    }

    .thumb {
      width: 140px;
      height: 79px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: #000;
    }

    .video-meta {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .video-title {
      font-size: 14.5px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 6px;
    }

    .video-sub {
      font-size: 12.5px;
      color: var(--muted);
    }

    .counter {
      font-family: 'JetBrains Mono', monospace;
      color: var(--amber);
      letter-spacing: 0.05em;
    }

    .mode-toggle {
      display: flex;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 18px;
    }

    .mode-toggle button {
      flex: 1;
      background: transparent;
      color: var(--muted);
      padding: 9px 0;
      border-radius: 6px;
    }

    .mode-toggle button.active {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 10px;
    }

    .quality-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }

    .qbtn {
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 8px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      text-align: center;
    }

    .qbtn:hover {
      border-color: #3A414C;
    }

    .qbtn.selected {
      border-color: var(--amber);
      background: var(--amber-dim);
      color: var(--amber);
    }

    .qbtn .hdr-tag {
      display: block;
      font-size: 9.5px;
      letter-spacing: .08em;
      color: var(--green);
      margin-top: 2px;
    }

    .empty-note {
      color: var(--muted);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      padding: 10px 0;
    }

    .download-row {
      display: flex;
      justify-content: flex-end;
    }

    .download-row button {
      padding: 13px 26px;
      font-size: 14.5px;
    }

    /* Playlist Rows Styling */
    .playlist-items {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      margin-bottom: 20px;
    }

    .playlist-items::-webkit-scrollbar {
      width: 8px;
    }

    .playlist-items::-webkit-scrollbar-track {
      background: var(--panel-2);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .playlist-items::-webkit-scrollbar-thumb {
      background: #3A414C;
      border-radius: 4px;
    }

    .playlist-items::-webkit-scrollbar-thumb:hover {
      background: #4B5563;
    }

    .playlist-row {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .playlist-row:last-child {
      border-bottom: none;
    }

    .row-thumb {
      width: 80px;
      height: 45px;
      object-fit: cover;
      border-radius: 4px;
      background: #000;
      flex-shrink: 0;
    }

    .row-meta {
      flex: 1;
      min-width: 0;
    }

    .row-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .row-sub {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .row-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      width: 155px;
    }

    .row-actions-btns {
      display: flex;
      gap: 6px;
    }

    .row-actions-btns button {
      padding: 6px 12px;
      font-size: 12px;
    }

    .row-status-line {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11.5px;
      min-height: 14px;
      text-align: right;
    }

    .row-status-line .dl-text {
      max-width: 115px;
    }

    footer {
      margin-top: 28px;
      color: #555B64;
      font-size: 12px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.6;
    }

    footer a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color .15s ease;
    }

    footer a:hover {
      color: var(--text);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
        animation: none !important;
      }

      .spinner-ring {
        stroke-dasharray: 100 0;
      }

      .check-bg {
        stroke-dashoffset: 0 !important;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="eyebrow">// yt-dlp, wired to a button</div>
    <h1>Puller</h1>
    <p class="sub">Paste a YouTube link. Pick video or audio, pick a quality, download. Nothing else.</p>

    <div class="panel">
      <div class="url-row">
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
        <button class="btn-primary" id="fetchBtn">Fetch</button>
      </div>
      <div class="field-row">
        <input type="text" id="filenameInput" placeholder="Optional filename (leave blank to use the title)" />
        <button class="btn-secondary" id="resetBtn">Reset</button>
      </div>
      <div class="status" id="fetchStatus"></div>
    </div>

    <div id="resultCard">
      <!-- Single Video Header -->
      <div id="singleHeader" class="video-card">
        <img class="thumb" id="thumb" src="" alt="" />
        <div class="video-meta">
          <div class="video-title" id="vidTitle"></div>
          <div class="video-sub">
            <span id="vidUploader"></span> &middot;
            <span class="counter" id="vidDuration"></span>
          </div>
        </div>
      </div>

      <!-- Playlist Header -->
      <div id="playlistHeader" class="video-card" style="display: none;">
        <div class="video-meta">
          <div class="video-title" id="plTitle"></div>
          <div class="video-sub">
            <span id="plUploader"></span> &middot;
            <span class="counter" id="plCount"></span>
          </div>
        </div>
      </div>

      <div class="mode-toggle">
        <button id="modeVideoBtn" class="active">Video</button>
        <button id="modeAudioBtn">Audio only</button>
      </div>

      <div class="section-label" id="qualityLabel">Video quality</div>
      <div class="quality-grid" id="qualityGrid"></div>

      <!-- Single Video Download Controls -->
      <div id="singleControls">
        <div class="download-row">
          <button class="btn-primary" id="downloadBtn" disabled>Download</button>
          <button class="btn-secondary" id="cancelBtn" style="display:none; margin-left: 10px;">Cancel</button>
        </div>
        <div class="status dl-status-container" id="downloadStatus">
          <svg class="dl-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle class="spinner-ring" cx="12" cy="12" r="9" />
            <path class="check-bg" d="M5.5 12.5l4.5 4.5 8.5-9" />
            <line class="err-line" x1="7" y1="7" x2="17" y2="17" />
            <line class="err-line" x1="17" y1="7" x2="7" y2="17" />
          </svg>
          <span class="eta-label"></span>
          <span class="dl-text"></span>
        </div>
      </div>

      <!-- Playlist Items & Zip Controls -->
      <div id="playlistControls" style="display: none;">
        <div class="section-label">Playlist Items</div>
        <div class="playlist-items" id="playlistItems"></div>

        <div class="download-row" style="margin-top: 20px;">
          <button class="btn-primary" id="zipDownloadBtn" disabled>Download all (.zip)</button>
          <button class="btn-secondary" id="zipCancelBtn" style="display:none; margin-left: 10px;">Cancel</button>
        </div>
        <div class="status dl-status-container" id="zipDownloadStatus">
          <svg class="dl-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle class="spinner-ring" cx="12" cy="12" r="9" />
            <path class="check-bg" d="M5.5 12.5l4.5 4.5 8.5-9" />
            <line class="err-line" x1="7" y1="7" x2="17" y2="17" />
            <line class="err-line" x1="17" y1="7" x2="7" y2="17" />
          </svg>
          <span class="eta-label"></span>
          <span class="dl-text"></span>
        </div>
      </div>
    </div>

    <footer>
      runs locally &middot; needs ffmpeg on PATH<br>
      developed and maintained by <a href="https://github.com/spicychief05" target="_blank"
        rel="noopener noreferrer">SpicychieF05</a>
    </footer>
  </div>

  <script>
    const API = "";
    let currentInfo = null;
    let mode = "video";
    let selectedQuality = null;

    const urlInput = document.getElementById("urlInput");
    const filenameInput = document.getElementById("filenameInput");
    const fetchBtn = document.getElementById("fetchBtn");
    const fetchStatus = document.getElementById("fetchStatus");
    const resultCard = document.getElementById("resultCard");
    const qualityGrid = document.getElementById("qualityGrid");
    const qualityLabel = document.getElementById("qualityLabel");
    const resetBtn = document.getElementById("resetBtn");

    function fmtDuration(sec) {
      if (!sec) return "--:--";
      sec = Math.round(sec);
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      const pad = n => String(n).padStart(2, "0");
      return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
    }

    function heightLabel(h) {
      if (h >= 2160) return "4K";
      if (h >= 1440) return "2K";
      return h + "p";
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fetchInfo() {
      const url = urlInput.value.trim();
      if (!url) {
        fetchStatus.textContent = "Paste a YouTube URL first.";
        fetchStatus.className = "status err";
        return;
      }

      fetchBtn.disabled = true;
      fetchStatus.className = "status";
      fetchStatus.textContent = "Reading info...";
      resultCard.style.display = "none";

      // Reset generic UI states
      [singleUi, zipUi].forEach(ui => resetJobUI(ui));

      try {
        const res = await fetch(`${API}/api/info`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Could not read that URL.");

        currentInfo = data;
        filenameInput.value = currentInfo.title || "";
        fetchStatus.textContent = "";
        renderResult();
      } catch (e) {
        fetchStatus.className = "status err";
        fetchStatus.textContent = e.message;
      } finally {
        fetchBtn.disabled = false;
      }
    }

    function renderResult() {
      const isPlaylist = currentInfo.is_playlist;

      if (isPlaylist) {
        document.getElementById("singleHeader").style.display = "none";
        document.getElementById("singleControls").style.display = "none";
        document.getElementById("playlistHeader").style.display = "flex";
        document.getElementById("playlistControls").style.display = "block";

        document.getElementById("plTitle").textContent = currentInfo.title || "Playlist";
        document.getElementById("plUploader").textContent = currentInfo.uploader || "Unknown uploader";
        document.getElementById("plCount").textContent = `${currentInfo.entries.length} videos`;

        const list = document.getElementById("playlistItems");
        list.innerHTML = "";
        currentInfo.entries.forEach(entry => {
          const row = document.createElement("div");
          row.className = "playlist-row";
          row.innerHTML = `
             <img class="row-thumb" src="${entry.thumbnail || ''}" alt="">
             <div class="row-meta">
                 <div class="row-title" title="${entry.title}">${entry.title}</div>
                 <div class="row-sub">${fmtDuration(entry.duration)}</div>
             </div>
             <div class="row-actions">
                 <div class="row-actions-btns">
                     <button class="btn-primary row-dl-btn" disabled>Download</button>
                     <button class="btn-secondary row-cancel-btn" style="display:none;">Cancel</button>
                 </div>
                 <div class="row-status-line status">
                     <svg class="dl-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <circle class="spinner-ring" cx="12" cy="12" r="9" />
                        <path class="check-bg" d="M5.5 12.5l4.5 4.5 8.5-9" />
                        <line class="err-line" x1="7" y1="7" x2="17" y2="17" />
                        <line class="err-line" x1="17" y1="7" x2="7" y2="17" />
                     </svg>
                     <span class="eta-label"></span>
                     <span class="dl-text"></span>
                 </div>
             </div>
          `;

          const ui = extractUI(row, '.row-dl-btn', '.row-cancel-btn', '.row-status-line');
          ui.btnDl.onclick = () => {
            const payload = {
              url: entry.url,
              mode,
              quality: String(selectedQuality),
              filename: `${(entry.index + 1).toString().padStart(3, '0')} - ${entry.title}`
            };
            runDownloadFlow(ui, payload, "/api/download/start");
          };
          list.appendChild(row);
        });

      } else {
        document.getElementById("playlistHeader").style.display = "none";
        document.getElementById("playlistControls").style.display = "none";
        document.getElementById("singleHeader").style.display = "flex";
        document.getElementById("singleControls").style.display = "block";

        document.getElementById("thumb").src = currentInfo.thumbnail || "";
        document.getElementById("vidTitle").textContent = currentInfo.title || "Untitled";
        document.getElementById("vidUploader").textContent = currentInfo.uploader || "Unknown uploader";
        document.getElementById("vidDuration").textContent = fmtDuration(currentInfo.duration);
      }

      resultCard.style.display = "block";
      setMode("video");
    }

    function setMode(m) {
      mode = m;
      selectedQuality = null;
      document.getElementById("modeVideoBtn").classList.toggle("active", m === "video");
      document.getElementById("modeAudioBtn").classList.toggle("active", m === "audio");
      qualityLabel.textContent = m === "video" ? "Video quality" : "Audio bitrate";

      document.getElementById("downloadBtn").disabled = true;
      document.getElementById("zipDownloadBtn").disabled = true;
      document.querySelectorAll(".row-dl-btn").forEach(b => b.disabled = true);

      renderQualityGrid();
    }

    function renderQualityGrid() {
      qualityGrid.innerHTML = "";
      if (mode === "video") {
        const qualities = currentInfo.video_qualities || [];
        if (qualities.length === 0) {
          qualityGrid.innerHTML = `<div class="empty-note">No video streams found.</div>`;
          return;
        }
        qualities.forEach(q => {
          const btn = document.createElement("button");
          btn.className = "qbtn";
          btn.innerHTML = heightLabel(q.height) + (q.hdr ? `<span class="hdr-tag">HDR</span>` : "");
          const value = q.height + (q.hdr ? "_hdr" : "");
          btn.onclick = () => selectQuality(value, btn);
          qualityGrid.appendChild(btn);
        });
      } else {
        (currentInfo.audio_bitrates || ["48", "128", "256", "320"]).forEach(kbps => {
          const btn = document.createElement("button");
          btn.className = "qbtn";
          btn.textContent = kbps + " kbps";
          btn.onclick = () => selectQuality(kbps, btn);
          qualityGrid.appendChild(btn);
        });
      }
    }

    function selectQuality(value, btn) {
      selectedQuality = value;
      [...qualityGrid.children].forEach(c => c.classList.remove("selected"));
      btn.classList.add("selected");

      document.getElementById("downloadBtn").disabled = false;
      document.getElementById("zipDownloadBtn").disabled = false;
      document.querySelectorAll(".row-dl-btn").forEach(b => b.disabled = false);
    }

    // --- Extracted Download Flow Manager ---
    function extractUI(container, btnDlSel, btnCancelSel, statusSel) {
      const st = container.querySelector(statusSel) || container;
      return {
        btnDl: container.querySelector(btnDlSel),
        btnCancel: container.querySelector(btnCancelSel),
        statusContainer: st,
        icon: st.querySelector('.dl-icon'),
        spinner: st.querySelector('.spinner-ring'),
        check: st.querySelector('.check-bg'),
        errLine: st.querySelectorAll('.err-line'),
        eta: st.querySelector('.eta-label'),
        text: st.querySelector('.dl-text')
      };
    }

    function resetJobUI(ui) {
      ui.statusContainer.className = "status dl-status-container";
      ui.icon.classList.remove("visible");
      ui.text.textContent = "";
      ui.btnDl.disabled = true;
      ui.btnCancel.style.display = "none";
    }

    const singleUi = extractUI(document, '#downloadBtn', '#cancelBtn', '#downloadStatus');
    const zipUi = extractUI(document, '#zipDownloadBtn', '#zipCancelBtn', '#zipDownloadStatus');

    singleUi.btnDl.onclick = () => {
      runDownloadFlow(singleUi, {
        url: urlInput.value.trim(),
        mode,
        quality: String(selectedQuality),
        filename: filenameInput.value.trim(),
      }, "/api/download/start");
    };

    zipUi.btnDl.onclick = () => {
      runDownloadFlow(zipUi, {
        items: currentInfo.entries.map(e => ({ url: e.url, title: e.title, index: e.index })),
        mode,
        quality: String(selectedQuality),
        filename: filenameInput.value.trim() || currentInfo.title || "",
      }, "/api/download/zip/start");
    };

    async function runDownloadFlow(ui, startPayload, endpoint) {
      if (!selectedQuality) return;
      ui.btnDl.disabled = true;
      ui.btnCancel.style.display = "inline-block";
      ui.btnCancel.disabled = false;
      ui.statusContainer.className = "status dl-status-container";

      ui.icon.classList.add("visible");
      ui.spinner.style.display = "";
      ui.check.style.display = "none";
      ui.errLine.forEach(e => e.style.display = "none");
      ui.check.classList.remove("drawn");
      ui.eta.classList.remove("visible");
      ui.text.textContent = "Starting...";

      let jobId = null;
      const ac = new AbortController();

      ui.btnCancel.onclick = async () => {
        if (!jobId) return;
        ui.btnCancel.disabled = true;
        try { await fetch(`${API}/api/download/cancel/${jobId}`, { method: "POST" }); } catch (e) { }
      };

      try {
        const startRes = await fetch(`${API}${endpoint}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(startPayload)
        });

        if (!startRes.ok) {
          const d = await startRes.json().catch(() => ({}));
          const errMsg = typeof d.detail === 'string' ? d.detail : (d.detail ? JSON.stringify(d.detail) : "Download failed.");
          throw new Error(errMsg);
        }

        const data = await startRes.json();
        jobId = data.job_id;

        // Polling loop
        (async () => {
          while (!ac.signal.aborted) {
            try {
              const res = await fetch(`${API}/api/download/status/${jobId}`);
              if (res.ok) {
                const st = await res.json();
                if (st.eta > 0) {
                  ui.eta.textContent = `${Math.round(st.eta)}s`;
                  ui.eta.classList.add("visible");
                } else {
                  ui.eta.classList.remove("visible");
                }
                if (st.progress_text) {
                  ui.text.textContent = st.progress_text;
                } else if (ui.text.textContent === "Starting...") {
                  ui.text.textContent = "Downloading...";
                }
              }
            } catch (e) { }
            await delay(800);
          }
        })();

        // Wait for file completion
        let fileRes;
        while (true) {
          fileRes = await fetch(`${API}/api/download/file/${jobId}`);
          if (fileRes.ok) break;
          const errData = await fileRes.json().catch(() => ({}));
          if (fileRes.status === 409) {
            await delay(700);
            continue;
          }
          throw new Error(errData.detail || "Download failed.");
        }

        const rawBlob = await fileRes.blob();
        const type = fileRes.headers.get("Content-Type") || "application/octet-stream";
        const blob = new Blob([rawBlob], { type });
        const disposition = fileRes.headers.get("Content-Disposition") || "";
        const match = disposition.match(/filename="?([^"]+)"?/);

        const fallback = endpoint.includes("zip") ? "playlist.zip" : (startPayload.mode === "audio" ? "audio.mp3" : "video.mp4");
        const filename = match ? match[1] : fallback;

        const a = document.createElement("a");
        const objUrl = URL.createObjectURL(blob);
        a.href = objUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(objUrl);

        // Success state
        ui.statusContainer.className = "status ok dl-status-container";
        ui.spinner.style.display = "none";
        ui.check.style.display = "";
        ui.eta.classList.remove("visible");
        requestAnimationFrame(() => ui.check.classList.add("drawn"));
        ui.text.textContent = "Done.";

      } catch (e) {
        if (e.message === "Download cancelled.") {
          ui.statusContainer.className = "status dl-status-container";
          ui.icon.classList.remove("visible");
          ui.text.textContent = "Cancelled.";
        } else {
          ui.statusContainer.className = "status err dl-status-container";
          ui.spinner.style.display = "none";
          ui.errLine.forEach(el => el.style.display = "");
          ui.eta.classList.remove("visible");
          ui.text.textContent = e.message || "Failed.";
        }
      } finally {
        ac.abort();
        ui.btnCancel.style.display = "none";
        ui.btnDl.disabled = false;
      }
    }

    fetchBtn.onclick = fetchInfo;
    urlInput.addEventListener("keydown", e => { if (e.key === "Enter") fetchInfo(); });
    document.getElementById("modeVideoBtn").onclick = () => setMode("video");
    document.getElementById("modeAudioBtn").onclick = () => setMode("audio");

    resetBtn.onclick = async () => {
      urlInput.value = "";
      filenameInput.value = "";
      fetchStatus.textContent = "";
      fetchStatus.className = "status";

      [singleUi, zipUi].forEach(ui => resetJobUI(ui));
      document.querySelectorAll(".row-dl-btn").forEach(b => {
        const rowUi = extractUI(b.closest('.playlist-row'), '.row-dl-btn', '.row-cancel-btn', '.row-status-line');
        resetJobUI(rowUi);
      });

      resultCard.style.display = "none";
      currentInfo = null;
      selectedQuality = null;

      try {
        await fetch(`${API}/api/reset`, { method: "POST" });
      } catch (e) {
        console.error("Reset failed", e);
      }
    };
  </script>
</body>

</html>
