<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puller — grab any YouTube video</title>
  <link rel="icon" type="image/svg+xml" href="/media/puller_fabicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0B0D10;
      --panel: #14171C;
      --panel-2: #1B1F26;
      --line: #262B33;
      --text: #E8EAED;
      --muted: #8A9099;
      --amber: #F5A623;
      --amber-dim: #4A3416;
      --green: #7CFC8A;
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      background:
        radial-gradient(circle at 15% 0%, rgba(245, 166, 35, 0.06), transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 640px;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }

    p.sub {
      color: var(--muted);
      font-size: 14.5px;
      margin: 0 0 32px;
      line-height: 1.5;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
    }

    .url-row {
      display: flex;
      gap: 10px;
    }

    .field-row {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    input[type=text] {
      flex: 1;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14.5px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      transition: border-color .15s;
    }

    input[type=text]:focus {
      border-color: var(--amber);
    }

    input[type=text]::placeholder {
      color: #5B6068;
    }

    button {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform .08s ease, filter .15s ease, background .15s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--amber);
      color: #1A1200;
      padding: 12px 20px;
      white-space: nowrap;
    }

    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    .btn-secondary {
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 12px 20px;
      white-space: nowrap;
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: #3A414C;
      background: #232832;
    }

    .status {
      margin-top: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      color: var(--muted);
      min-height: 16px;
    }

    .status.err {
      color: #F26B6B;
    }

    .status.ok {
      color: var(--green);
    }

    #resultCard {
      display: none;
      margin-top: 24px;
    }

    .video-card {
      display: flex;
      gap: 14px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 20px;
    }

    .thumb {
      width: 140px;
      height: 79px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: #000;
    }

    .video-meta {
      min-width: 0;
    }

    .video-title {
      font-size: 14.5px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 6px;
    }

    .video-sub {
      font-size: 12.5px;
      color: var(--muted);
    }

    .counter {
      font-family: 'JetBrains Mono', monospace;
      color: var(--amber);
      letter-spacing: 0.05em;
    }

    .mode-toggle {
      display: flex;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 18px;
    }

    .mode-toggle button {
      flex: 1;
      background: transparent;
      color: var(--muted);
      padding: 9px 0;
      border-radius: 6px;
    }

    .mode-toggle button.active {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 10px;
    }

    .quality-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }

    .qbtn {
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 8px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      text-align: center;
    }

    .qbtn:hover {
      border-color: #3A414C;
    }

    .qbtn.selected {
      border-color: var(--amber);
      background: var(--amber-dim);
      color: var(--amber);
    }

    .qbtn .hdr-tag {
      display: block;
      font-size: 9.5px;
      letter-spacing: .08em;
      color: var(--green);
      margin-top: 2px;
    }

    .empty-note {
      color: var(--muted);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      padding: 10px 0;
    }

    .download-row {
      display: flex;
      justify-content: flex-end;
    }

    .download-row button {
      padding: 13px 26px;
      font-size: 14.5px;
    }

    footer {
      margin-top: 28px;
      color: #555B64;
      font-size: 12px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.6;
    }

    footer a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color .15s ease;
    }

    footer a:hover {
      color: var(--text);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
      }

      .progress-fill.indeterminate {
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="eyebrow">// yt-dlp, wired to a button</div>
    <h1>Puller</h1>
    <p class="sub">Paste a YouTube link. Pick video or audio, pick a quality, download. Nothing else.</p>

    <div class="panel">
      <div class="url-row">
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
        <button class="btn-primary" id="fetchBtn">Fetch</button>
      </div>
      <div class="field-row">
        <input type="text" id="filenameInput" placeholder="Optional filename (leave blank to use the title)" />
        <button class="btn-secondary" id="resetBtn">Reset</button>
      </div>
      <div class="status" id="fetchStatus"></div>
    </div>

    <div id="resultCard">
      <div class="video-card">
        <img class="thumb" id="thumb" src="" alt="" />
        <div class="video-meta">
          <div class="video-title" id="vidTitle"></div>
          <div class="video-sub">
            <span id="vidUploader"></span> &middot;
            <span class="counter" id="vidDuration"></span>
          </div>
        </div>
      </div>

      <div class="mode-toggle">
        <button id="modeVideoBtn" class="active">Video</button>
        <button id="modeAudioBtn">Audio only</button>
      </div>

      <div class="section-label" id="qualityLabel">Video quality</div>
      <div class="quality-grid" id="qualityGrid"></div>

      <div class="download-row">
        <button class="btn-primary" id="downloadBtn" disabled>Download</button>
      </div>
      <div class="status" id="downloadStatus" style="text-align:right;"></div>
    </div>

    <footer>
      runs locally &middot; needs ffmpeg on PATH<br>
      developed and maintained by <a href="https://github.com/spicychief05" target="_blank"
        rel="noopener noreferrer">SpicychieF05</a>
    </footer>
  </div>

  <script>
    const API = ""; // same origin
    let currentInfo = null;
    let mode = "video";
    let selectedQuality = null;

    const urlInput = document.getElementById("urlInput");
    const filenameInput = document.getElementById("filenameInput");
    const fetchBtn = document.getElementById("fetchBtn");
    const fetchStatus = document.getElementById("fetchStatus");
    const resultCard = document.getElementById("resultCard");
    const qualityGrid = document.getElementById("qualityGrid");
    const qualityLabel = document.getElementById("qualityLabel");
    const downloadBtn = document.getElementById("downloadBtn");
    const downloadStatus = document.getElementById("downloadStatus");
    const resetBtn = document.getElementById("resetBtn");

    function fmtDuration(sec) {
      if (!sec) return "--:--";
      sec = Math.round(sec);
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      const pad = n => String(n).padStart(2, "0");
      return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
    }

    function heightLabel(h) {
      if (h >= 2160) return "4K";
      if (h >= 1440) return "2K";
      return h + "p";
    }

    async function fetchInfo() {
      const url = urlInput.value.trim();
      if (!url) { fetchStatus.textContent = "Paste a YouTube URL first."; fetchStatus.className = "status err"; return; }

      fetchBtn.disabled = true;
      fetchStatus.className = "status";
      fetchStatus.textContent = "Reading video info...";
      resultCard.style.display = "none";

      try {
        const res = await fetch(`${API}/api/info`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Could not read that video.");

        currentInfo = data;
        filenameInput.value = currentInfo.title || "";
        fetchStatus.textContent = "";
        renderResult();
      } catch (e) {
        fetchStatus.className = "status err";
        fetchStatus.textContent = e.message;
      } finally {
        fetchBtn.disabled = false;
      }
    }

    function renderResult() {
      document.getElementById("thumb").src = currentInfo.thumbnail || "";
      document.getElementById("vidTitle").textContent = currentInfo.title || "Untitled";
      document.getElementById("vidUploader").textContent = currentInfo.uploader || "Unknown uploader";
      document.getElementById("vidDuration").textContent = fmtDuration(currentInfo.duration);
      resultCard.style.display = "block";
      setMode("video");
    }

    function setMode(m) {
      mode = m;
      selectedQuality = null;
      downloadBtn.disabled = true;
      document.getElementById("modeVideoBtn").classList.toggle("active", m === "video");
      document.getElementById("modeAudioBtn").classList.toggle("active", m === "audio");
      qualityLabel.textContent = m === "video" ? "Video quality" : "Audio bitrate";
      renderQualityGrid();
    }

    function renderQualityGrid() {
      qualityGrid.innerHTML = "";

      if (mode === "video") {
        const qualities = currentInfo.video_qualities || [];
        if (qualities.length === 0) {
          qualityGrid.innerHTML = `<div class="empty-note">No video streams found for this URL.</div>`;
          return;
        }
        qualities.forEach(q => {
          const btn = document.createElement("button");
          btn.className = "qbtn";
          btn.innerHTML = heightLabel(q.height) + (q.hdr ? `<span class="hdr-tag">HDR</span>` : "");
          const value = q.height + (q.hdr ? "_hdr" : "");
          btn.onclick = () => selectQuality(value, btn);
          qualityGrid.appendChild(btn);
        });
      } else {
        (currentInfo.audio_bitrates || ["48", "128", "256", "320"]).forEach(kbps => {
          const btn = document.createElement("button");
          btn.className = "qbtn";
          btn.textContent = kbps + " kbps";
          btn.onclick = () => selectQuality(kbps, btn);
          qualityGrid.appendChild(btn);
        });
      }
    }

    function selectQuality(value, btn) {
      selectedQuality = value;
      [...qualityGrid.children].forEach(c => c.classList.remove("selected"));
      btn.classList.add("selected");
      downloadBtn.disabled = false;
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function waitForFinishedFile(jobId) {
      while (true) {
        const res = await fetch(`${API}/api/download/file/${jobId}`);
        if (res.ok) return res;

        const data = await res.json().catch(() => ({}));
        if (res.status === 409) {
          await delay(700);
          continue;
        }

        throw new Error(data.detail || "Download failed.");
      }
    }

    async function fetchFinishedFile(jobId) {
      const res = await waitForFinishedFile(jobId);

      const rawBlob = await res.blob();
      const blob = new Blob([rawBlob], { type: mode === "audio" ? "audio/mpeg" : "video/mp4" });
      const disposition = res.headers.get("Content-Disposition") || "";
      const match = disposition.match(/filename="?([^"]+)"?/);
      const filename = match ? match[1] : (mode === "audio" ? "audio.mp3" : "video.mp4");

      const a = document.createElement("a");
      const objUrl = URL.createObjectURL(blob);
      a.href = objUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(objUrl);
    }

    async function doDownload() {
      if (!selectedQuality) return;
      downloadBtn.disabled = true;
      downloadStatus.className = "status";
      downloadStatus.textContent = "Preparing download...";

      try {
        const startRes = await fetch(`${API}/api/download/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            url: urlInput.value.trim(),
            mode,
            quality: String(selectedQuality),
            filename: filenameInput.value.trim(),
          })
        });

        if (!startRes.ok) {
          const data = await startRes.json().catch(() => ({}));
          throw new Error(data.detail || "Download failed.");
        }

        const startData = await startRes.json();
        const jobId = startData.job_id;
        if (!jobId) throw new Error("Download failed: missing job id.");

        await fetchFinishedFile(jobId);
        downloadStatus.className = "status ok";
        downloadStatus.textContent = "Done — check your downloads folder.";

        return;
      } catch (e) {
        downloadStatus.className = "status err";
        downloadStatus.textContent = e.message || "Download failed.";
      } finally {
        downloadBtn.disabled = false;
      }
    }

    fetchBtn.onclick = fetchInfo;
    urlInput.addEventListener("keydown", e => { if (e.key === "Enter") fetchInfo(); });
    document.getElementById("modeVideoBtn").onclick = () => setMode("video");
    document.getElementById("modeAudioBtn").onclick = () => setMode("audio");
    downloadBtn.onclick = doDownload;

    resetBtn.onclick = async () => {
      urlInput.value = "";
      filenameInput.value = "";
      fetchStatus.textContent = "";
      fetchStatus.className = "status";
      downloadStatus.textContent = "";
      downloadStatus.className = "status";
      resultCard.style.display = "none";
      currentInfo = null;
      selectedQuality = null;
      downloadBtn.disabled = true;

      try {
        await fetch(`${API}/api/reset`, { method: "POST" });
      } catch (e) {
        console.error("Reset backend failed", e);
      }
    };
  </script>
</body>

</html>
